<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACP Courses 2025 — Academic Dashboard</title>
    <meta name="description" content="Browse courses under the Academic and Capacity Building Program. View instructors, enrollment stats, and course details." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- ─── Sidebar ─── -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__header">
          <div class="sidebar__logo">
            <img src="logo.png" alt="Portal Logo" class="sidebar__logo-img" />
          </div>
          <button class="sidebar__collapse-btn" id="sidebarToggle" type="button" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
        </div>


        <div class="sidebar__panel">
          <div class="sidebar__title">
            <span>Course Categories</span>
            <span class="sidebar__title-count" id="totalCategories"></span>
          </div>
          <div id="categoryList" class="category-list"></div>
        </div>

        <div class="sidebar__bottom">
          <div class="sidebar__card sidebar__card--sop" tabindex="0">
            <div class="sidebar__card-icon sidebar__card-icon--red" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <div>
              <div class="sidebar__card-title">All SOPs</div>
              <div class="sidebar__card-text">View all Standard Operating Procedures</div>
            </div>
            <div class="sidebar__card-arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
          </div>

          <div class="sidebar__card sidebar__card--feedback" tabindex="0">
            <div class="sidebar__card-icon sidebar__card-icon--green" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div>
              <div class="sidebar__card-title">Feedback</div>
              <div class="sidebar__card-text">Share your feedback with us</div>
            </div>
            <div class="sidebar__card-arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
          </div>
        </div>
      </aside>

      <!-- ─── Main Content ─── -->
      <main class="main">
        <!-- Top bar -->
        <header class="topbar">
          <button class="topbar__menu-btn" id="mobileMenuBtn" type="button" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="breadcrumb" id="breadcrumb"></div>
          <div class="topbar__actions">
            <div class="topbar__search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="courseSearch" placeholder="Search courses…" autocomplete="off" />
            </div>
            <button class="topbar__icon-btn" type="button" aria-label="Notifications">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="topbar__badge">3</span>
            </button>
            <div class="topbar__avatar" aria-label="User profile">
              <span>AK</span>
            </div>
          </div>
        </header>

        <!-- Hero Section -->
        <section class="hero">
          <div class="hero__content">
            <img src="un111.png" alt="ACP Courses illustration" class="hero__bg-img" />
            <div class="hero__text">
              <h1 id="pageTitle"></h1>
              <p id="pageSubtitle"></p>
              <div class="hero__actions">
                <button class="hero__btn hero__btn--primary" type="button">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                  Explore Courses
                </button>
                <button class="hero__btn hero__btn--ghost" type="button">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                  Download Syllabus
                </button>
              </div>
            </div>
          </div>
          <!-- Search Bar -->
          <div class="search-bar">
            <div class="search-bar__dropdown">
              <select id="categoryDropdown">
                <option value="miscellaneous">Miscellaneous</option>
                <option value="sample-courses">Sample_Courses</option>
                <option value="archived">Archived</option>
                <option value="even-25262">EVEN_25262</option>
                <option value="odd-26271">ODD_26271</option>
                <option value="test-demo">Test/Demo Category</option>
              </select>
            </div>
            <div class="search-bar__input">
              <input type="text" id="courseSearchBar" placeholder="Search courses" autocomplete="off" />
              <button class="search-bar__btn" type="button" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              </button>
            </div>
          </div>
        </section>

        <!-- Toolbar -->
        <section class="toolbar">
          <div class="toolbar__left">
            <label class="sort-control">
              <span>Sort by:</span>
              <select id="sortSelect">
                <option value="recent">Recently Added</option>
                <option value="enrolled">Most Enrolled</option>
                <option value="alpha">Alphabetical</option>
              </select>
            </label>
          </div>

          <div class="toolbar__right">
            <div class="view-switch" role="group" aria-label="View mode">
              <button class="view-switch__btn view-switch__btn--active" data-view="grid" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Grid
              </button>
              <button class="view-switch__btn" data-view="list" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                List
              </button>
            </div>
          </div>
        </section>

        <!-- Course Grid -->
        <section id="courseGrid" class="course-grid"></section>
      </main>
    </div>

    <!-- ─── Overlay for mobile sidebar ─── -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ─── Templates ─── -->
    <template id="categoryTemplate">
      <button class="category" type="button">
        <span class="category__icon"></span>
        <span class="category__label"></span>
        <span class="category__count"></span>
        <span class="category__chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
        </span>
      </button>
    </template>

    <template id="subCategoryTemplate">
      <button class="subcategory" type="button">
        <span class="subcategory__bullet"></span>
        <span class="subcategory__label"></span>
        <span class="subcategory__count"></span>
      </button>
    </template>

    <template id="statTemplate">
      <article class="stat">
        <div class="stat__icon"></div>
        <div class="stat__info">
          <div class="stat__label"></div>
          <div class="stat__value"></div>
        </div>
      </article>
    </template>

    <template id="courseTemplate">
      <article class="course-card">
        <div class="course-card__banner">
          <span class="course-card__badge"></span>
          <div class="course-card__art"></div>
          <div class="course-card__mark"></div>
        </div>
        <div class="course-card__body">
          <h3 class="course-card__title"></h3>
          <div class="course-card__footer">
            <div class="course-card__enrolled"></div>
            <button class="course-card__button" type="button">
              View Course
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
          </div>
        </div>
      </article>
    </template>

    <script src="index.js"></script>
  </body>
</html>
